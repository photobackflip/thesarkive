      if (!game || !game.appId || game.useSteamArt === false) return [];

      const appId = game.appId;
      const urls = [];

      if (game.assetHash) {
        urls.push(
          `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${appId}/${game.assetHash}/library_600x900_2x.jpg`,
          `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${appId}/${game.assetHash}/library_600x900.jpg`,
          `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${appId}/${game.assetHash}/library_capsule_2x.jpg`,
          `https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/${appId}/${game.assetHash}/library_capsule.jpg`
        );
      }

      urls.push(
        `https://cdn.cloudflare.steamstatic.com/steam/apps/${appId}/library_600x900_2x.jpg`,
        `https://cdn.cloudflare.steamstatic.com/steam/apps/${appId}/library_600x900.jpg`,
        `https://shared.cloudflare.steamstatic.com/steam/apps/${appId}/library_600x900_2x.jpg`,
        `https://shared.cloudflare.steamstatic.com/steam/apps/${appId}/library_600x900.jpg`,
        `https://cdn.cloudflare.steamstatic.com/steam/apps/${appId}/header.jpg`
      );

      return urls;
    }

    function imageCandidates(game) {
      return [safeImageUrl(game?.image), ...steamImageCandidates(game)].filter(Boolean);
    }

    function setImageWithFallback(imgElement, game) {
      const candidates = imageCandidates(game);
      const fallbackImage = placeholderGameImage(game?.title || "NO ART");
      let index = 0;

      if (!imgElement) return;

      if (!candidates.length) {
        imgElement.src = fallbackImage;
        imgElement.classList.add("is-fallback");
        return;
      }

      imgElement.onerror = () => {
        index++;
        if (index < candidates.length) {
          imgElement.src = candidates[index];
        } else {
          imgElement.onerror = null;
          imgElement.classList.add("is-fallback");
          imgElement.src = fallbackImage;
        }
      };

      imgElement.src = candidates[index];
    }

    function parseDayMenuKey(dayKey) {
      const match = String(dayKey).match(/^DAY(\d+)([a-z])?(?:[_-](.+))?$/i);
      if (!match) return null;

      return {
        num: String(match[1]).padStart(3, "0"),
        suffix: match[2] ? match[2].toUpperCase() : "",
        date: match[3] ? String(match[3]).trim() : ""
      };
    }

    function formatDayMenuDate(dateValue) {
      const cleaned = String(dateValue || "").trim();
      const match = cleaned.match(/^(\d{2})(\d{2})(\d{2})$/);
      return match ? `${match[1]}.${match[2]}.${match[3]}` : cleaned;
    }

    function formatDayMenuLabel(dayKey) {
      const parsed = parseDayMenuKey(dayKey);
      if (!parsed) return String(dayKey).toUpperCase();
      const formattedDate = formatDayMenuDate(parsed.date);
      return `DAY ${parsed.num}${parsed.suffix}${formattedDate ? ` // ${formattedDate}` : ""}`;
    }

    function formatNavLabelHtml(label) {
      const match = String(label).match(/^(DAY\s+\d{3}[A-Z]?)(?:\s+\/\/\s+(.+))?$/);
      if (!match || !match[2]) return escapeHtml(label);
      return `${escapeHtml(match[1])} // <span class="nav-label-date">${escapeHtml(match[2])}</span>`;
    }

    function keyFromDaySection(section) {

    function renderPlayerProfileRows(player) {
      const profile = Array.isArray(player?.profile) ? player.profile : [];
      const visibleProfile = profile.filter(field => {
        if (!field || field.divider) return true;
        return String(field.label || "").trim().toUpperCase() !== "STATUS";
      });

      while (visibleProfile.length && visibleProfile[visibleProfile.length - 1]?.divider) {
        visibleProfile.pop();
      }

      return visibleProfile.map(field => {
        if (field.divider) {
          return `<div class="player-dossier-divider" aria-hidden="true"></div>`;
        }
        return `
          <div class="player-dossier-row">
            <div class="player-dossier-label">${escapeHtml(field.label)}</div>
            <div class="player-dossier-colon">:</div>
            <div class="player-dossier-value">${escapeHtml(field.value)}</div>
          </div>
        `;
      }).join("");
    }

            }
            return `<li>${escapeHtml(fact)}</li>`;
          }).join("")}

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function safeExternalUrl(value) {
      if (!value) return "";

      try {
        const url = new URL(String(value), window.location.href);
        return ["http:", "https:"].includes(url.protocol) ? url.href : "";
      } catch {
        return "";
      }
    }

    function safeImageUrl(value) {
      if (!value) return "";

      const raw = String(value).trim();
      if (!raw) return "";

      if (!/^[a-z][a-z0-9+.-]*:/i.test(raw)) return raw;

      try {
        const url = new URL(raw, window.location.href);
        return ["http:", "https:", "file:"].includes(url.protocol) || raw.startsWith("data:image/") ? raw : "";
      } catch {
        return "";
      }
    }

    function getStoredTheme() {
      try {
        const storedTheme = localStorage.getItem(themeStorageKey);
        return themeOptions.some(theme => theme.key === storedTheme) ? storedTheme : "dark";
      } catch {
        return "dark";
      }
    }

    function refreshThemeDependentAssets() {
      playerRecords.forEach(player => {
        if (!player.image) player.image = placeholderPlayerImage(player.name);
      });
    }

    function syncThemeControls() {
      if (themeToggle) {
        themeToggle.setAttribute("aria-expanded", String(themeMenuOpen));
        themeToggle.title = `Theme: ${activeTheme.toUpperCase()}`;
        themeToggle.innerHTML = `
          <span class="nav-button-inner">
            <span class="nav-icon">${navIcon("palette")}</span>
            <span class="nav-label">Theme</span>
          </span>
        `;
      }

      if (themePicker) {
        themePicker.classList.toggle("is-open", themeMenuOpen);
      }

      if (themeMenu) {
        themeMenu.innerHTML = themeOptions.map(theme => `
          <button class="theme-option" type="button" role="menuitemradio" aria-checked="${theme.key === activeTheme}" data-theme-key="${theme.key}">
            ${escapeHtml(theme.label)}
          </button>
        `).join("");

        themeMenu.querySelectorAll(".theme-option").forEach(button => {
          button.addEventListener("click", () => setTheme(button.dataset.themeKey));
        });
      }
    }

    function setTheme(themeKey, options = {}) {
      const nextTheme = themeOptions.some(theme => theme.key === themeKey) ? themeKey : "dark";
      activeTheme = nextTheme;
      document.documentElement.dataset.theme = nextTheme;
      document.body.dataset.theme = nextTheme;

      try {
        localStorage.setItem(themeStorageKey, nextTheme);
      } catch {}

      refreshThemeDependentAssets();
      themeMenuOpen = false;
      syncThemeControls();

      if (!options.skipRender) render();
    }

    function toggleThemeMenu() {
      themeMenuOpen = !themeMenuOpen;
      syncThemeControls();
    }

    function closeThemeMenu() {
      if (!themeMenuOpen) return;
      themeMenuOpen = false;
      syncThemeControls();
    }

    function isResponsiveNav() {
      return window.matchMedia("(max-width: 960px)").matches;
    }

    function syncResponsiveNav(open = document.body.classList.contains("nav-open")) {
      const shouldOpen = Boolean(open && isResponsiveNav());
      document.body.classList.toggle("nav-open", shouldOpen);

      if (navToggle) {
        navToggle.setAttribute("aria-expanded", String(shouldOpen));
        navToggle.setAttribute("aria-label", shouldOpen ? "Close navigation" : "Open navigation");
      }

      if (siteNav) {
        const navIsHidden = isResponsiveNav() && !shouldOpen;
        siteNav.setAttribute("aria-hidden", String(navIsHidden));
        siteNav.inert = navIsHidden;
      }
    }

    function openResponsiveNav() {
      syncResponsiveNav(true);
    }

    function closeResponsiveNav() {
      syncResponsiveNav(false);
    }

    function syncSidebarCollapse(collapsed = sidebarCollapsed) {
      const shouldCollapse = Boolean(collapsed && !isResponsiveNav());
      document.body.classList.toggle("sidebar-collapsed", shouldCollapse);
      if (shouldCollapse) closeThemeMenu();

      if (sidebarCollapseToggle) {
        sidebarCollapseToggle.setAttribute("aria-pressed", String(shouldCollapse));
        sidebarCollapseToggle.setAttribute("aria-label", shouldCollapse ? "Expand sidebar" : "Collapse sidebar");
        sidebarCollapseToggle.title = shouldCollapse ? "Expand sidebar" : "Collapse sidebar";
        sidebarCollapseToggle.innerHTML = `
          <span class="nav-button-inner">
            <span class="nav-icon">${navIcon("sidebar")}</span>
            <span class="nav-label">${shouldCollapse ? "" : ""}</span>
          </span>
        `;
      }
    }

    function toggleSidebarCollapse() {
      if (isResponsiveNav()) return;
      sidebarCollapsed = !sidebarCollapsed;
      syncSidebarCollapse(sidebarCollapsed);
    }

    function setActiveSection(section) {
      activeSection = section;
      resetTransientStateFor(section);
      if (isDaySection(section)) {
        activeDayKey = keyFromDaySection(section) || activeDayKey;
        selectedGameIndex = 0;
        expandedDayKey = activeDayKey;
      }
      render();
    }

    function goBackToRoot() {
      activeSection = "HOME";
      selectedGameIndex = 0;
      activePlayerId = null;
      selectedSearchAppId = null;
      selectedGameListAppId = null;
      selectedLibraryAppId = null;
      resetWatchSession();
      selectedOperatorName = null;
      selectedOperatorGameAppId = null;
      selectedOperatorSource = null;
      selectedOperatorType = "operator";
      render();

    function selectGame(index) {

      render();
    }

    function selectPlayer(playerId) {

    function backToPlayers() {

    function selectPlayerGames(playerId) {

    function normalizeSearchValue(value) {
      return String(value ?? "")
        .toLowerCase()
        .replace(/[_\-:]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function getSearchableGames() {
      return Object.values(gamesById)
        .filter(game => game && game.title)
        .sort(compareGameListEntries);
    }

    function stringifySearchValue(value) {
      if (Array.isArray(value)) return value.filter(Boolean).join(" ");
      return String(value ?? "");
    }

    function getSearchFieldDefinition(fieldKey) {
      return searchFields.find(field => field.key === fieldKey) || searchFields[0];
    }

    function getActiveSearchFields() {
      return searchField === "all" ? searchFields : [getSearchFieldDefinition(searchField)];
    }

    function readSearchField(game, field) {
      if (!game || !field) return "";
      const value = typeof field.read === "function" ? field.read(game) : game[field.key];
      return stringifySearchValue(value);
    }

    function getSearchResultForGame(game, query) {
      for (const field of getActiveSearchFields()) {
        const value = readSearchField(game, field);
        if (normalizeSearchValue(value).includes(query)) {
          return { game, field, value };
        }
      }
      return null;
    }

    function getSearchResults() {
      const query = normalizeSearchValue(searchQuery);
      if (!query) return [];

      return getSearchableGames()
        .map(game => getSearchResultForGame(game, query))
        .filter(Boolean);
    }

    function selectSearchGame(appId) {
      selectedSearchAppId = appId;
      activeSection = "SEARCH_DETAIL";
      render();
    }

    function backToSearchResults() {
      activeSection = "SEARCH";
      selectedSearchAppId = null;
      render();
    }

    function selectGameListGame(appId) {
      selectedGameListAppId = appId;
      activeSection = "GAME_LIST_DETAIL";
      render();
    }

    function backToGameList() {
      activeSection = "GAME LIST";
      selectedGameListAppId = null;
      selectedOperatorName = null;
      selectedOperatorGameAppId = null;
      selectedOperatorSource = null;
      selectedOperatorType = "operator";
      render();
    }

    function selectLibrarySort(sortKey) {
      librarySort = sortKey === "archiveNumber" ? "archiveNumber" : "releaseDate";
      activeSection = "LIBRARY";
      selectedLibraryAppId = null;
      render();
    }

    function selectLibraryGame(appId) {
      selectedLibraryAppId = appId;
      activeSection = "LIBRARY_DETAIL";
      render();
    }

    function backToLibrary() {
      activeSection = "LIBRARY";
      selectedLibraryAppId = null;
      render();
    }

    function getOperatorSourceFromGame(game) {
      if (!game || !game.appId) return null;

      return {
        appId: game.appId,
        title: game.title || `AppID ${game.appId}`,
        activeSection,
        activeDayKey,
        selectedGameIndex,
        selectedSearchAppId,
        selectedGameListAppId,
        selectedLibraryAppId,
        selectedOperatorName,
        selectedOperatorGameAppId,
        selectedOperatorType
      };
    }

    function normalizeOperatorType(operatorType) {
      const value = String(operatorType || "operator").toLowerCase();
      return ["operator", "developer", "publisher"].includes(value) ? value : "operator";
    }

    function operatorTypeSingular(operatorType = selectedOperatorType) {
      const type = normalizeOperatorType(operatorType);
      if (type === "developer") return "Developer";
      if (type === "publisher") return "Publisher";
      return "Operator";
    }

    function operatorGameListTitle(operatorName, operatorType = selectedOperatorType) {
      const type = normalizeOperatorType(operatorType);
      const title = type === "developer" ? "DEVELOPER GAMES" : type === "publisher" ? "PUBLISHER GAMES" : "GAME LIST";
      return `${title} - ${escapeHtml(operatorName)}`;
    }

    function operatorPanelTitle() {
      if (selectedOperatorSource?.type === "player-profile") return "PLAYERS";
      return `${operatorTypeSingular().toUpperCase()} LIST`;
    }

    function selectOperator(operatorName, sourceGame = null, operatorType = "operator") {
      if (sourceGame) selectedOperatorSource = getOperatorSourceFromGame(sourceGame);
      selectedOperatorType = normalizeOperatorType(operatorType);
      selectedOperatorName = String(operatorName || "").trim();
      selectedOperatorGameAppId = null;
      activeSection = "OPERATOR_LIST";
      render();
    }

    function selectOperatorFromGameList(operatorName, operatorType = "operator") {
      selectedOperatorSource = { type: "game-list", activeSection: "GAME LIST" };
      selectOperator(operatorName, null, operatorType);
    }

    function selectOperatorGame(appId) {
      selectedOperatorGameAppId = appId;
      activeSection = "OPERATOR_GAME_DETAIL";
      render();
    }

    function backToOperatorList() {
      activeSection = "OPERATOR_LIST";
      selectedOperatorGameAppId = null;
      render();
    }

    function operatorSourceTitle() {
      if (!selectedOperatorSource) return "";
      const sourceGame = selectedOperatorSource.appId ? resolveGameById(selectedOperatorSource.appId) : null;
      return sourceGame?.title || selectedOperatorSource.title || "GAME";
    }

    function backToOperatorSourceGame() {
      const source = selectedOperatorSource;
      if (!source) return;

      activeSection = source.activeSection || "GAME_LIST_DETAIL";
      activeDayKey = source.activeDayKey || activeDayKey;
      selectedGameIndex = Number.isFinite(Number(source.selectedGameIndex)) ? Number(source.selectedGameIndex) : selectedGameIndex;
      selectedSearchAppId = source.selectedSearchAppId;
      selectedGameListAppId = source.selectedGameListAppId;
      selectedLibraryAppId = source.selectedLibraryAppId;
      selectedOperatorName = source.selectedOperatorName;
      selectedOperatorGameAppId = source.selectedOperatorGameAppId;
      selectedOperatorType = normalizeOperatorType(source.selectedOperatorType);

      if (activeSection === "SEARCH_DETAIL") selectedSearchAppId = source.appId;
      if (activeSection === "GAME_LIST_DETAIL") selectedGameListAppId = source.appId;
      if (activeSection === "LIBRARY_DETAIL") selectedLibraryAppId = source.appId;
      if (activeSection === "OPERATOR_GAME_DETAIL") selectedOperatorGameAppId = source.appId;

      selectedOperatorSource = null;
      render();
    }

    function navIcon(type) {
      const icons = {
        home: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10.5V20h13v-9.5"/><path d="M9.5 20v-6h5v6"/></svg>`,

        sidebar: `<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="14" rx="2"/><path d="M9 5v14"/><path d="m14 9 3 3-3 3"/></svg>`
      };

      return icons[type] || icons.file;
    }

    function chevronIcon() {
      return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 5 7 7-7 7"/></svg>`;
    }

    function addNavItem(targetList, label, value, isActive, onClick, className = "", iconType = "file", hasChevron = false) {
      const li = document.createElement("li");
      const button = document.createElement("button");
      button.type = "button";
      button.className = [isActive ? "active" : "", className].filter(Boolean).join(" ");
      if (isActive) button.setAttribute("aria-current", "page");
      button.onclick = () => {
        onClick();
        closeResponsiveNav();
      };
      button.innerHTML = `
        <span class="nav-button-inner">
          <span class="nav-icon">${navIcon(iconType)}</span>
          <span class="nav-label">${formatNavLabelHtml(label)}</span>
          ${hasChevron ? `<span class="nav-chevron">${chevronIcon()}</span>` : ""}
        </span>
      `;
      li.appendChild(button);
      targetList.appendChild(li);
      return li;
    }

    function lockedNavIcon(section) {
      const icons = {
        HOME: "home",
        ABOUT: "info",
        PLAYERS: "players",
        "GAME LIST": "gamepad",
        LIBRARY: "library",
        WATCH: "watch",
        SEARCH: "search"
      };

      return icons[section] || "file";
    }

    function resetTransientStateFor(section) {
      if (section !== "PLAYER BIO") activePlayerId = null;
      if (section !== "SEARCH_DETAIL") selectedSearchAppId = null;
      if (section !== "GAME_LIST_DETAIL") selectedGameListAppId = null;
      if (section !== "LIBRARY_DETAIL") selectedLibraryAppId = null;
      if (!["OPERATOR_LIST", "OPERATOR_GAME_DETAIL"].includes(section)) {
        selectedOperatorName = null;
        selectedOperatorGameAppId = null;
        selectedOperatorSource = null;
        selectedOperatorType = "operator";
      }
    }

    function toggleDayDropdown(dayKey) {
      expandedDayKey = expandedDayKey === dayKey ? null : dayKey;
      renderTopNav();
    }

    function selectDayGame(dayKey, index) {
      const section = formatDayMenuLabel(dayKey);
      activeSection = section;
      activeDayKey = dayKey;
      selectedGameIndex = index;
      expandedDayKey = dayKey;
      resetTransientStateFor(section);
      render();
    }

    function addDayNavItem(dayKey) {
      const section = formatDayMenuLabel(dayKey);
      const isActiveDay = activeDayKey === dayKey && isDaySection(activeSection);
      const isOpen = expandedDayKey === dayKey;
      const li = document.createElement("li");
      const button = document.createElement("button");
      const subNavId = `day-subnav-${dayKey}`;

      li.className = ["day-nav-item", isOpen ? "is-open" : "", isActiveDay ? "active-day" : ""].filter(Boolean).join(" ");
      button.type = "button";
      button.className = ["day-nav-toggle", isActiveDay ? "active" : ""].filter(Boolean).join(" ");
      button.setAttribute("aria-expanded", String(isOpen));
      button.setAttribute("aria-controls", subNavId);
      button.onclick = () => toggleDayDropdown(dayKey);
      button.innerHTML = `
        <span class="nav-button-inner">
          <span class="nav-icon">${navIcon("folder")}</span>
          <span class="nav-label">${formatNavLabelHtml(section)}</span>
          <span class="nav-chevron">${chevronIcon()}</span>
        </span>
      `;

      li.appendChild(button);

      if (isOpen) {
        const entries = dayMenus[dayKey] || [];
        const gamesList = document.createElement("ul");
        gamesList.className = "day-subnav";
        gamesList.id = subNavId;
        gamesList.setAttribute("aria-label", `${section} games`);

        entries.forEach((appId, index) => {
          const item = resolveGameById(appId, dayKey, index);
          const isActiveGame = isActiveDay && index === selectedGameIndex;
          addNavItem(gamesList, item.title, `__game__${index}`, isActiveGame, () => selectDayGame(dayKey, index), "day-game-link", "tile", false);
        });

        li.appendChild(gamesList);
      }

      topNav.appendChild(li);
    }

    function renderLockedNav() {
      const playerGamesActive = selectedOperatorSource?.type === "player-profile" && ["OPERATOR_LIST", "OPERATOR_GAME_DETAIL"].includes(activeSection);

      sections.forEach((section) => {
        const iconType = lockedNavIcon(section);
        const isActive = section === activeSection ||
          (section === "PLAYERS" && (activeSection === "PLAYER BIO" || playerGamesActive)) ||
          (section === "GAME LIST" && (["GAME_LIST_DETAIL"].includes(activeSection) || (["OPERATOR_LIST", "OPERATOR_GAME_DETAIL"].includes(activeSection) && !playerGamesActive))) ||
          (section === "LIBRARY" && activeSection === "LIBRARY_DETAIL") ||
          (section === "SEARCH" && activeSection === "SEARCH_DETAIL");
        addNavItem(fixedNav, section, section, isActive, () => setActiveSection(section), "", iconType, false);
      });
    }

    function renderTopNav() {
      fixedNav.innerHTML = "";
      topNav.innerHTML = "";

      renderLockedNav();

      Object.keys(dayMenus).forEach(addDayNavItem);
    }

    function render() {
      prepareWatchForRender();
      stopHomeTimer();
      renderTopNav();
      panelTitle.textContent = activeSection;

      if (activeSection === "HOME") {
        crumbs.textContent = "HOME";
        renderHome();
        return;
      }

      if (activeSection === "ABOUT") {
        crumbs.textContent = "ABOUT";
        renderAbout();
        return;
      }

      if (activeSection === "PLAYERS") {
        crumbs.textContent = "PLAYERS";
        renderPlayers();
        return;
      }

      if (activeSection === "PLAYER BIO") {
        const player = getPlayerById(activePlayerId);
        crumbs.innerHTML = `<button class="search-back-button player-back-button" type="button">&lt;- BACK TO PLAYERS</button>`;
        const playerBackButton = crumbs.querySelector(".player-back-button");
        if (playerBackButton) playerBackButton.addEventListener("click", backToPlayers);
        renderPlayerBio(player);
        return;
      }

      if (activeSection === "GAME LIST") {
        crumbs.textContent = "GAME LIST";
        renderGameList();
        return;
      }

      if (activeSection === "GAME_LIST_DETAIL") {
        panelTitle.textContent = "GAME LIST";
        crumbs.innerHTML = `<button class="search-back-button game-list-back-button" type="button">&lt;- BACK TO GAME LIST</button>`;
        const gameListBackButton = crumbs.querySelector(".game-list-back-button");
        if (gameListBackButton) gameListBackButton.addEventListener("click", backToGameList);
        renderGameListGameDetail();
        return;
      }

      if (activeSection === "OPERATOR_LIST") {
        panelTitle.textContent = operatorPanelTitle();
        if (selectedOperatorSource?.type === "player-profile") {
          crumbs.innerHTML = `<button class="search-back-button player-profile-back-button" type="button">&lt;- BACK TO PROFILE</button>`;
          const playerProfileBackButton = crumbs.querySelector(".player-profile-back-button");
          if (playerProfileBackButton) playerProfileBackButton.addEventListener("click", backToPlayerProfile);
        } else if (selectedOperatorSource?.type === "game-list") {
          crumbs.innerHTML = `<button class="search-back-button game-list-back-button" type="button">&lt;- BACK TO GAME LIST</button>`;
          const gameListBackButton = crumbs.querySelector(".game-list-back-button");
          if (gameListBackButton) gameListBackButton.addEventListener("click", backToGameList);
        } else if (selectedOperatorSource) {
          crumbs.innerHTML = `<button class="search-back-button operator-source-back-button" type="button">&lt;- BACK TO ${escapeHtml(operatorSourceTitle())}</button>`;
          const operatorSourceBackButton = crumbs.querySelector(".operator-source-back-button");
          if (operatorSourceBackButton) operatorSourceBackButton.addEventListener("click", backToOperatorSourceGame);
        } else {
          crumbs.textContent = operatorPanelTitle();
        }
        renderOperatorGameList();
        return;
      }

      if (activeSection === "OPERATOR_GAME_DETAIL") {
        panelTitle.textContent = operatorPanelTitle();
        crumbs.innerHTML = `<button class="search-back-button operator-list-back-button" type="button">&lt;- BACK TO GAME LIST</button>`;
        const operatorListBackButton = crumbs.querySelector(".operator-list-back-button");
        if (operatorListBackButton) operatorListBackButton.addEventListener("click", backToOperatorList);
        renderOperatorGameDetail();
        return;
      }

      if (activeSection === "LIBRARY") {
        panelTitle.textContent = "LIBRARY";
        renderLibraryCrumbs();
        renderLibrary();
        return;
      }

      if (activeSection === "LIBRARY_DETAIL") {
        panelTitle.textContent = "LIBRARY";
        crumbs.innerHTML = `<button class="search-back-button library-back-button" type="button">&lt;- BACK TO LIBRARY</button>`;
        const libraryBackButton = crumbs.querySelector(".library-back-button");
        if (libraryBackButton) libraryBackButton.addEventListener("click", backToLibrary);
        renderLibraryGameDetail();
        return;
      }

      if (activeSection === "WATCH") {
        crumbs.textContent = "WATCH";
        renderWatch();
        return;
      }

      if (activeSection === "SEARCH") {
        crumbs.textContent = "SEARCH";
        renderSearch();
        return;
      }

      if (activeSection === "SEARCH_DETAIL") {
        panelTitle.textContent = "SEARCH";
        crumbs.innerHTML = `<button class="search-back-button" type="button">&lt;- BACK TO SEARCH RESULTS</button>`;
        const searchBackButton = crumbs.querySelector(".search-back-button");
        if (searchBackButton) searchBackButton.addEventListener("click", backToSearchResults);
        renderSearchGameDetail();
        return;
      }

      const entries = currentDayEntries();
      const selectedGame = entries[selectedGameIndex] ? resolveGameById(entries[selectedGameIndex], activeDayKey, selectedGameIndex) : null;
      crumbs.textContent = selectedGame ? `${activeSection} / ${selectedGame.title.toUpperCase()}` : `ROOT://${activeSection}`;
      renderDay();
    }

    function padHomeCounter(value) {

    function homeElapsedParts(now) {
      if (!(now instanceof Date)) now = new Date();

      if (now <= homeTrapStartDate) {
        return { months: 0, days: 0, hours: 0, minutes: 0, seconds: 0 };
      }

      let months = (now.getFullYear() - homeTrapStartDate.getFullYear()) * 12 + (now.getMonth() - homeTrapStartDate.getMonth());
      let anchor = new Date(homeTrapStartDate.getTime());
      anchor.setMonth(homeTrapStartDate.getMonth() + months);

      if (anchor > now) {
        months -= 1;
        anchor = new Date(homeTrapStartDate.getTime());
        anchor.setMonth(homeTrapStartDate.getMonth() + months);
      }

      let remaining = now.getTime() - anchor.getTime();
      const dayMs = 24 * 60 * 60 * 1000;
      const hourMs = 60 * 60 * 1000;
      const minuteMs = 60 * 1000;

      const days = Math.floor(remaining / dayMs);
      remaining -= days * dayMs;
      const hours = Math.floor(remaining / hourMs);
      remaining -= hours * hourMs;
      const minutes = Math.floor(remaining / minuteMs);
      remaining -= minutes * minuteMs;
      const seconds = Math.floor(remaining / 1000);

      return { months, days, hours, minutes, seconds };
    }

    function updateHomeTimer() {
      const timer = content.querySelector(".home-timer-display");
      if (!timer) return;

      const parts = homeElapsedParts(new Date());
      Object.entries(parts).forEach(([part, value]) => {
        const node = timer.querySelector(`[data-home-timer-part="${part}"]`);
        if (node) node.textContent = padHomeCounter(value);
      });
    }

    function startHomeTimer() {
      stopHomeTimer();
      updateHomeTimer();
      homeTimerInterval = window.setInterval(updateHomeTimer, 1000);
    }

    function parseYouTubeTime(value) {
      const raw = String(value ?? "").trim().toLowerCase();
      if (!raw) return 0;
      if (/^\d+(?:\.\d+)?$/.test(raw)) return Math.max(0, Math.floor(Number(raw)));

      if (/^\d+:\d{1,2}(?::\d{1,2})?$/.test(raw)) {
        const parts = raw.split(":").map(part => Number(part));
        if (parts.length === 2) return (parts[0] * 60) + parts[1];
        return (parts[0] * 3600) + (parts[1] * 60) + parts[2];
      }

      let total = 0;
      let matched = false;
      raw.replace(/(\d+(?:\.\d+)?)\s*([hms])/g, (match, amount, unit) => {
        matched = true;
        const number = Number(amount);
        if (unit === "h") total += number * 3600;
        if (unit === "m") total += number * 60;
        if (unit === "s") total += number;
        return match;
      });

      return matched ? Math.max(0, Math.floor(total)) : 0;
    }

    function parseYouTubeVodUrl(value) {
      const externalUrl = safeExternalUrl(value);
      if (!externalUrl) return null;

      try {
        const url = new URL(externalUrl);
        const host = url.hostname.replace(/^www\./i, "").toLowerCase();
        let videoId = "";

        if (host === "youtu.be") {
          videoId = url.pathname.split("/").filter(Boolean)[0] || "";
        } else if (["youtube.com", "m.youtube.com", "music.youtube.com", "youtube-nocookie.com"].includes(host)) {
          const pathParts = url.pathname.split("/").filter(Boolean);
          if (pathParts[0] === "embed" || pathParts[0] === "shorts" || pathParts[0] === "live") {
            videoId = pathParts[1] || "";
          } else {
            videoId = url.searchParams.get("v") || "";
          }
        }

        videoId = String(videoId).replace(/[^a-zA-Z0-9_-]/g, "").slice(0, 32);
        if (!videoId) return null;

        const hashTime = url.hash.replace(/^#(?:t=)?/i, "");
        const startSeconds = parseYouTubeTime(
          url.searchParams.get("t") ||
          url.searchParams.get("start") ||
          url.searchParams.get("time_continue") ||
          hashTime
        );

        return { videoId, startSeconds };
      } catch {
        return null;
      }
    }

    function loadYouTubeIframeAPI(callback) {
      if (window.YT && window.YT.Player) {
        watchApiReady = true;
        callback();
        return;
      }

      watchApiReadyCallbacks.push(callback);
      if (watchApiLoading) return;

      watchApiLoading = true;
      const previousReadyHandler = window.onYouTubeIframeAPIReady;

      window.onYouTubeIframeAPIReady = function () {
        watchApiReady = true;
        if (typeof previousReadyHandler === "function") previousReadyHandler();

        while (watchApiReadyCallbacks.length) {
          const readyCallback = watchApiReadyCallbacks.shift();
          readyCallback();
        }
      };

      const script = document.createElement("script");
      script.src = "https://www.youtube.com/iframe_api";
      script.async = true;
      document.head.appendChild(script);
    }

      return watchPlaybackSeconds;

      if (games.length === 1) return games[0];

      const currentId = Number(selectedWatchGameAppId);
      let nextGame = games[Math.floor(Math.random() * games.length)];
      let guard = 0;

      while (Number(nextGame.appId) === currentId && guard < 8) {

        guard++;
      }

      return nextGame;

    function createOrLoadWatchPlayer({ autoplay = false } = {}) {
      const vod = getSelectedWatchVod();
      const playerElement = document.getElementById("watchPlayer");
      if (!vod || !playerElement) return;

      const startSeconds = watchResumeSecondsFor(vod.game);
      titleWatchPlayer(vod.game);
      watchPendingAutoplay = Boolean(autoplay);
      playerElement.innerHTML = `<div id="watchYoutubePlayer" class="watch-iframe" aria-label="${escapeHtml(`Now playing: ${vod.game.title}`)}"></div>`;
      const thisToken = ++watchPlayerToken;

      loadYouTubeIframeAPI(() => {
        if (thisToken !== watchPlayerToken || activeSection !== "WATCH") return;
        const target = document.getElementById("watchYoutubePlayer");
        if (!target) return;

        watchPlayer = new YT.Player(target, {
          width: "100%",
          height: "100%",
          videoId: vod.videoId,
          playerVars: {
            autoplay: autoplay ? 1 : 0,
            controls: 1,
            rel: 0,
            modestbranding: 1,
            playsinline: 1,
            start: startSeconds
          },
          events: {
            onReady: () => {
              if (thisToken !== watchPlayerToken) return;
              watchPlayerReady = true;

              if (watchPendingAutoplay && watchPlayer && typeof watchPlayer.playVideo === "function") {
                try {
                  watchPlayer.playVideo();
                } catch {}
              }
            },
            onStateChange: (event) => {
              if (thisToken !== watchPlayerToken) return;
              if (!window.YT || !window.YT.PlayerState) return;

              if (event.data === YT.PlayerState.PLAYING) {
                watchIsPlaying = true;
              } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                storeWatchCurrentTime();
                watchIsPlaying = false;
              }

              syncWatchControls();
            }
          }
        });
      });
    }

    function titleWatchPlayer(game) {
      const titleElement = document.getElementById("watchNowPlaying");
      if (titleElement) titleElement.textContent = game ? `Now playing: ${game.title}` : "Now playing: —";
    }

    function updateWatchPlayer(game) {
      const playerElement = document.getElementById("watchPlayer");
      if (!playerElement) return;

      titleWatchPlayer(game);

      if (!game) {
        playerElement.innerHTML = `<div class="watch-empty-state">Press PLAY to pull a random VOD from the archive.</div>`;
        watchIsPlaying = false;
        syncWatchControls();
        return;
      }

      if (!parseYouTubeVodUrl(game.vodLink)) {
        playerElement.innerHTML = `<div class="watch-empty-state">This VOD link could not be loaded.</div>`;
        watchIsPlaying = false;
        syncWatchControls();
        return;
      }

      createOrLoadWatchPlayer({ autoplay: watchIsPlaying });
      syncWatchControls();
    }

    function playSelectedWatchVideo() {
      const selectedGame = getSelectedWatchGame();
      if (!selectedGame) return;

      watchIsPlaying = true;
      syncWatchControls();

      if (!watchPlayer) {
        createOrLoadWatchPlayer({ autoplay: true });
        return;
      }

      if (watchPlayerReady && typeof watchPlayer.playVideo === "function") {
        try {
          watchPlayer.playVideo();
        } catch {}
      } else {
        watchPendingAutoplay = true;
      }
    }

    function pauseSelectedWatchVideo() {
      storeWatchCurrentTime();
      watchIsPlaying = false;
      watchPendingAutoplay = false;
      syncWatchControls();

      if (watchPlayer && typeof watchPlayer.pauseVideo === "function") {
        try {
          watchPlayer.pauseVideo();
        } catch {}
      }
    }

    function playNextWatchVideo() {
      const nextGame = selectRandomWatchGame();
      if (!nextGame) return;

      destroyWatchPlayer();
      watchHasStarted = true;
      selectedWatchGameAppId = nextGame.appId;
      watchPlaybackSeconds = selectedWatchStartSeconds(nextGame);
      watchIsPlaying = true;
      updateWatchPlayer(nextGame);
    }

    function toggleWatchPlayback() {
      if (!watchHasStarted) {
        playNextWatchVideo();
        return;
      }

      if (watchIsPlaying) {
        pauseSelectedWatchVideo();
      } else {
        playSelectedWatchVideo();
      }
    }

    function gameListValue(game, key) {
      const value = game?.[key];
      if (Array.isArray(value)) return value.filter(Boolean).join(", ");
      return String(value ?? "");
    }

    function getArchiveSortNumber(game) {
      const value = String(game?.archiveNumber ?? "").trim();
      if (!value || value === "---") return null;

      const number = Number(value);
      return Number.isFinite(number) ? number : null;
    }

    function compareGameListEntries(a, b) {
      const aNum = getArchiveSortNumber(a);
      const bNum = getArchiveSortNumber(b);
      const aHasNumber = aNum !== null;
      const bHasNumber = bNum !== null;

      if (aHasNumber && bHasNumber && aNum !== bNum) return aNum - bNum;
      if (aHasNumber && !bHasNumber) return -1;
      if (!aHasNumber && bHasNumber) return 1;

      return String(a.title || "").localeCompare(String(b.title || ""));
    }


    function getOperatorNames(playedWith) {
      const values = Array.isArray(playedWith) ? playedWith : String(playedWith ?? "").split(/\s*-\s*/);
      const ignored = new Set(["", "not logged", "none", "n/a", "---"]);

      return values
        .map(value => String(value ?? "").trim())
        .filter(value => !ignored.has(value.toLowerCase()));
    }

    function getCreditNames(value) {
      const values = Array.isArray(value) ? value : String(value ?? "").split(/\s*,\s*/);
      const ignored = new Set(["", "not logged", "none", "n/a", "---"]);

      return values
        .map(item => String(item ?? "").trim())
        .filter(item => !ignored.has(item.toLowerCase()));
    }

    function getGameEntityNames(game, operatorType = selectedOperatorType) {
      const type = normalizeOperatorType(operatorType);
      if (type === "developer") return getCreditNames(game?.developers);
      if (type === "publisher") return getCreditNames(game?.publishers);
      return getOperatorNames(game?.playedWith);
    }

    function operatorKey(value) {
      return normalizeSearchValue(value);

    function gameHasOperator(game, operatorName, operatorType = selectedOperatorType) {
      const selectedKey = operatorKey(operatorName);

      return getGameEntityNames(game, operatorType).some(operator => operatorKey(operator) === selectedKey);

          ${renderAppearancesHTML(selectedGame)}

          <section class="detail-section" aria-label="Field notes">
            <h3 class="detail-section-title">Field Notes</h3>
            ${hasNotes ? `<ul class="detail-notes">${notes.map(note => `<li>${escapeHtml(note)}</li>`).join("")}</ul>` : `<p class="detail-value">No notes logged.</p>`}
          </section>
        </article>
      `;

      target.querySelectorAll(".operator-link").forEach(button => {
        button.addEventListener("click", () => selectOperator(button.dataset.operatorName, selectedGame, button.dataset.operatorType));
      });

      const detailImage = target.querySelector(".detail-image");
      if (detailImage) setImageWithFallback(detailImage, selectedGame);
    }

    if (navToggle) {
      navToggle.addEventListener("click", () => {
        if (document.body.classList.contains("nav-open")) {
          closeResponsiveNav();
        } else {
          openResponsiveNav();
        }
      });
    }

    if (navClose) {
      navClose.addEventListener("click", closeResponsiveNav);
    }

    if (navScrim) {
      navScrim.addEventListener("click", closeResponsiveNav);
    }

    if (sidebarCollapseToggle) {
      sidebarCollapseToggle.addEventListener("click", toggleSidebarCollapse);
    }

    if (themeToggle) {
      themeToggle.addEventListener("click", (event) => {
        event.stopPropagation();
        toggleThemeMenu();
      });
    }

    if (themeMenu) {
      themeMenu.addEventListener("click", event => event.stopPropagation());
    }

    document.addEventListener("click", closeThemeMenu);

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeThemeMenu();
        closeResponsiveNav();
      }
    });

    window.addEventListener("resize", () => {
      syncResponsiveNav();
      syncSidebarCollapse(sidebarCollapsed);
    });

    setTheme(getStoredTheme(), { skipRender: true });
    render();
    syncResponsiveNav(false);
    syncSidebarCollapse(false);
    syncThemeControls();
  </script>

</body>
</html>
